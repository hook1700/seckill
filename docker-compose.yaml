version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: seckill_redis
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
    ports:
      - "6379:6379"
    restart: unless-stopped

  app:
    build: .
    container_name: seckill_app
    ports:
      - "8080:8080"
    depends_on:
      - redis
    environment:
      GOMAXPROCS: 1
      REDIS_ADDR: redis:6379
    restart: unless-stopped