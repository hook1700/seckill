version: "3.8"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: seckill_zk
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: seckill_kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true

      # ✅ 关键：限制 JVM（比 Bitnami 稳得多）
      KAFKA_HEAP_OPTS: "-Xms128M -Xmx256M"
      KAFKA_JVM_PERFORMANCE_OPTS: "-XX:+UseG1GC -XX:MaxGCPauseMillis=20"

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
    ports:
      - "9092:9092"

  redis:
    image: redis:7-alpine
    container_name: seckill_redis
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    ports: [ "6379:6379" ]

  mysql:
    image: mysql:8.0
    container_name: seckill_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: seckill
    volumes:
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb_buffer_pool_size=256M
      --max_connections=50
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    ports: [ "3306:3360" ]

  app:
    build: .
    container_name: seckill_app
    depends_on: [ redis, mysql, kafka ]
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    ports: [ "8080:8080" ]