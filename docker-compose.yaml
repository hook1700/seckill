version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: seckill_redis
    command: redis-server --appendonly yes
    ports: ["6379:6379"]

  mysql:
    image: mysql:8.0
    container_name: seckill_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: seckill
    volumes:
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports: ["3306:3306"]

  app:
    build: .
    container_name: seckill_app
    depends_on: [redis, mysql]
    environment:
      GOMAXPROCS: 1
      REDIS_ADDR: redis:6379
      MYSQL_DSN: root:root123@tcp(mysql:3306)/seckill?charset=utf8mb4&parseTime=true
    ports: ["8080:8080"]